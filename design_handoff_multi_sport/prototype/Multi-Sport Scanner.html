<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Z-Source · Multi-Sport Scanner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../redesign/tokens.css" />
  <link rel="stylesheet" href="../redesign/animations.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; }
    .zs-nav-item:hover:not(.active) { color: var(--fg) !important; }
    .zs-desk:hover:not([data-active]) { background: var(--surface) !important; }
    .zs-desk-add:hover { color: var(--accent) !important; background: var(--accent-fill) !important; }
    .zs-fix-row:hover { background: var(--surface) !important; }
    .zs-fix-row:hover .zs-row-analyse { border-color: var(--accent) !important; color: var(--accent) !important; }
    .zs-ghost-btn:hover { filter: brightness(1.12); }
    .zs-analyse-btn:hover { filter: brightness(1.1); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="sports.js"></script>
  <script type="text/babel" data-presets="react" src="chrome.jsx"></script>
  <script type="text/babel" data-presets="react" src="scanner.jsx"></script>
</body>
</html>
